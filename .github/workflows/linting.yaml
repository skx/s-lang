name: Linting
on: [pull_request]
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout repo
       uses: actions/checkout@v3

     - name: Setup Go
       uses: actions/setup-go@v6
       with:
         go-version: '1.25.x'

     - name: Lint
       uses: golangci/golangci-lint-action@v8
       with:
         version: latest
